<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#0f0f1a"/>
  <!-- Mango body -->
  <ellipse cx="16" cy="17" rx="10" ry="11" fill="url(#mg)"/>
  <!-- Mango top bump -->
  <ellipse cx="16" cy="9" rx="5" ry="4" fill="url(#mg)"/>
  <!-- Stem -->
  <rect x="15" y="4" width="2" height="4" rx="1" fill="#4a7c3f"/>
  <!-- Leaf -->
  <ellipse cx="19" cy="5" rx="4" ry="1.5" transform="rotate(-30 19 5)" fill="#5a9e4a"/>
  <!-- Highlight -->
  <ellipse cx="12" cy="13" rx="2.5" ry="3.5" fill="rgba(255,255,255,0.18)" transform="rotate(-15 12 13)"/>
  <defs>
    <linearGradient id="mg" x1="8" y1="6" x2="24" y2="28" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffd040"/>
      <stop offset="55%" stop-color="#ff8c00"/>
      <stop offset="100%" stop-color="#e05000"/>
    </linearGradient>
  </defs>
</svg>
