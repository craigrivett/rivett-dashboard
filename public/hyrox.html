<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hyrox – Rebecca & Dani 💜🧡</title>
  <style>
    :root {
      --bg: #0f0f13;
      --card: #1a1a22;
      --border: #2a2a38;
      --accent: #f5a623;
      --green: #4caf82;
      --red: #e05a5a;
      --blue: #5b9cf6;
      --purple: #c084fc;
      --text1: #f0f0f5;
      --text2: #9090aa;
      --text3: #5a5a78;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg); color: var(--text1);
      min-height: 100vh; padding: 14px;
      max-width: 500px; margin: 0 auto;
    }

    header { text-align: center; padding: 16px 0 18px; }
    header img { width: 64px; height: 64px; display: block; margin: 0 auto 10px; }
    header h1 { font-size: 20px; font-weight: 800; }
    .team-name {
      font-size: 14px; font-weight: 700; margin-top: 4px;
      background: linear-gradient(90deg, #c084fc, #fb923c);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .sub { color: var(--text2); font-size: 11px; margin-top: 3px; }

    /* Summary */
    .summary-bar {
      display: grid; grid-template-columns: repeat(3, 1fr);
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 12px 10px; margin-bottom: 14px; gap: 6px;
    }
    .sum-item { text-align: center; }
    .sum-label { font-size: 9px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 3px; }
    .sum-value { font-size: 19px; font-weight: 700; font-variant-numeric: tabular-nums; }
    .cv-blue { color: var(--blue); }
    .cv-green { color: var(--green); }
    .cv-accent { color: var(--accent); }

    /* Progress */
    .progress-wrap { margin-bottom: 14px; }
    .progress-bar { height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--purple), var(--accent)); border-radius: 3px; transition: width 0.4s; }
    .progress-label { display: flex; justify-content: space-between; font-size: 10px; color: var(--text2); margin-top: 3px; }

    /* Race timeline */
    .timeline { display: flex; flex-direction: column; gap: 5px; }

    /* Run row */
    .run-row {
      background: #151b2b; border: 1px solid #1e2a42;
      border-radius: 10px; padding: 9px 12px;
      display: flex; align-items: center; gap: 10px;
    }
    .run-icon { font-size: 18px; }
    .run-label { flex: 1; }
    .run-name { font-size: 12px; font-weight: 600; color: var(--blue); }
    .run-split { font-size: 11px; color: var(--text2); margin-top: 1px; }
    .run-time { font-size: 15px; font-weight: 700; font-variant-numeric: tabular-nums; color: var(--blue); }
    .run-time.done { color: var(--green); }

    /* Station card */
    .station-card {
      background: #18152a; border: 1px solid #2a1e42;
      border-radius: 12px; overflow: hidden;
    }
    .station-header {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 13px; cursor: pointer; user-select: none;
    }
    .station-badge {
      width: 28px; height: 28px; border-radius: 8px;
      background: #2a1e45; color: var(--purple);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; flex-shrink: 0;
    }
    .station-info { flex: 1; min-width: 0; }
    .station-name { font-size: 13px; font-weight: 700; }
    .station-detail { font-size: 10px; color: var(--text2); margin-top: 1px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .station-duration {
      font-size: 15px; font-weight: 700; font-variant-numeric: tabular-nums;
      flex-shrink: 0; min-width: 52px; text-align: right;
    }
    .station-duration.done { color: var(--green); }
    .station-duration.partial { color: var(--accent); }
    .station-duration.empty { color: var(--text3); }
    .chev { color: var(--text3); font-size: 10px; margin-left: 4px; flex-shrink: 0; transition: transform 0.2s; }
    .chev.open { transform: rotate(180deg); }

    /* Station input panel */
    .station-panel { display: none; padding: 10px 13px 13px; border-top: 1px solid #2a1e42; background: #110f1a; }
    .station-panel.open { display: block; }
    .ts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
    .ts-group label {
      font-size: 10px; color: var(--text2); display: block; margin-bottom: 4px;
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    .ts-input {
      width: 100%; padding: 10px 8px; background: var(--card);
      border: 1.5px solid var(--border); border-radius: 8px;
      color: var(--text1); font-size: 18px; font-weight: 700;
      font-variant-numeric: tabular-nums; text-align: center;
      outline: none; transition: border-color 0.15s; letter-spacing: 1px;
    }
    .ts-input:focus { border-color: var(--accent); }
    .ts-input.in-field:focus { border-color: var(--purple); }
    .ts-input::placeholder { color: var(--text3); font-size: 14px; }
    .ts-input.error { border-color: var(--red); }
    .input-hint { font-size: 10px; color: var(--text3); margin-bottom: 8px; }
    .chip-label { font-size: 10px; color: var(--text3); margin-bottom: 4px; }
    .chips { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 10px; }
    .chip {
      font-size: 11px; padding: 4px 9px; border-radius: 8px;
      background: #1f1f2e; border: 1px solid var(--border); color: var(--text2);
      cursor: pointer; font-weight: 600;
    }
    .chip:active { border-color: var(--accent); color: var(--accent); }
    .btn-row { display: flex; gap: 7px; }
    .btn-set {
      flex: 1; padding: 10px; background: var(--accent); color: #000;
      border: none; border-radius: 8px; font-weight: 700; font-size: 14px; cursor: pointer;
    }
    .btn-set:active { opacity: 0.85; }
    .btn-clear {
      padding: 10px 13px; background: transparent; color: var(--text3);
      border: 1.5px solid var(--border); border-radius: 8px; font-size: 12px; cursor: pointer;
    }

    /* Projection */
    .projection {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px 16px; margin-top: 14px;
    }
    .proj-title { font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 6px; }
    .proj-finish { font-size: 42px; font-weight: 800; color: var(--accent); font-variant-numeric: tabular-nums; text-align: center; line-height: 1; }
    .proj-note { font-size: 11px; color: var(--text3); text-align: center; margin-top: 5px; }
    .proj-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--border);
      gap: 6px;
    }
    .proj-item { text-align: center; }
    .proj-val { font-size: 14px; font-weight: 700; font-variant-numeric: tabular-nums; }
    .proj-lbl { font-size: 9px; color: var(--text2); margin-top: 2px; }

    /* Reset */
    .btn-reset {
      display: block; width: 100%; margin-top: 12px;
      padding: 11px; background: transparent; color: var(--text3);
      border: 1px solid var(--border); border-radius: 10px;
      font-size: 12px; cursor: pointer; text-align: center;
    }
  </style>
</head>
<body>

<header>
  <img src="/hyrox-logo.svg" alt="Hyrox">
  <h1>Hyrox Split Tracker</h1>
  <div class="team-name">💜 Rebecca & Dani 🧡 — Women's Doubles</div>
  <div class="sub">Enter the race clock time when they enter &amp; exit each station</div>
</header>

<div class="summary-bar">
  <div class="sum-item">
    <div class="sum-label">Race Time</div>
    <div class="sum-value cv-blue" id="sum-elapsed">—</div>
  </div>
  <div class="sum-item">
    <div class="sum-label">Stations Done</div>
    <div class="sum-value cv-accent" id="sum-done">0 / 8</div>
  </div>
  <div class="sum-item">
    <div class="sum-label">Est. Finish</div>
    <div class="sum-value cv-green" id="sum-finish">—</div>
  </div>
</div>

<div class="progress-wrap">
  <div class="progress-bar">
    <div class="progress-fill" id="progress-fill" style="width:0%"></div>
  </div>
  <div class="progress-label">
    <span>Start</span>
    <span id="progress-pct">0%</span>
    <span>Finish</span>
  </div>
</div>

<div class="timeline" id="timeline"></div>

<div class="projection" id="projection" style="display:none">
  <div class="proj-title">📊 Estimated Finish</div>
  <div class="proj-finish" id="proj-finish">—</div>
  <div class="proj-note" id="proj-note"></div>
  <div class="proj-grid">
    <div class="proj-item">
      <div class="proj-val" id="proj-run">—</div>
      <div class="proj-lbl">Total Running</div>
    </div>
    <div class="proj-item">
      <div class="proj-val" id="proj-station">—</div>
      <div class="proj-lbl">Total Stations</div>
    </div>
    <div class="proj-item">
      <div class="proj-val" id="proj-pace">—</div>
      <div class="proj-lbl">Avg Pace /km</div>
    </div>
  </div>
</div>

<button class="btn-reset" onclick="resetAll()">🔄 Reset all</button>

<script>
// ── Race structure ───────────────────────────────────────────────────────────
// 8 stations; runs are inferred from timestamps between them.
// State: { s1: { in: secs, out: secs }, s2: ... }
// Run 1 = 0 → s1.in
// Station 1 = s1.in → s1.out
// Run 2 = s1.out → s2.in  ... etc.
// Final finish = s8.out

const STATIONS = [
  { id:'s1', name:'SkiErg',             detail:'1,000 m total (alternate)',       emoji:'⛷️'  },
  { id:'s2', name:'Sled Push',          detail:'50 m · 102 kg (alternate)',       emoji:'🛷'  },
  { id:'s3', name:'Sled Pull',          detail:'50 m · 78 kg (alternate)',        emoji:'🧲'  },
  { id:'s4', name:'Burpee Broad Jumps', detail:'80 m total (alternate)',          emoji:'💥'  },
  { id:'s5', name:'Rowing',             detail:'1,000 m total (alternate)',       emoji:'🚣'  },
  { id:'s6', name:'Farmers Carry',      detail:'200 m · 2×16 kg (alternate)',    emoji:'🏋️'  },
  { id:'s7', name:'Sandbag Lunges',     detail:'100 m · 10 kg (alternate)',      emoji:'🎒'  },
  { id:'s8', name:'Wall Balls',         detail:'100 reps · 4 kg (alternate)',    emoji:'🏀'  },
];

// Suggested station duration chips (not absolute times, just quick-fill for station duration)
// We'll use absolute time chips based on reasonable cumulative splits
// Actually we'll just let them type freely — no chips needed for cumulative times since they're unique each race

// ── State ─────────────────────────────────────────────────────────────────
let data = {}; // { s1: { in: secs, out: secs }, ... }

function load() {
  try {
    const s = localStorage.getItem('hyrox2_data');
    if (s) data = JSON.parse(s);
    if (!data || typeof data !== 'object') data = {};
  } catch(e) { data = {}; }
}
function save() { localStorage.setItem('hyrox2_data', JSON.stringify(data)); }

// ── Helpers ────────────────────────────────────────────────────────────────
function parseTime(str) {
  if (!str || !str.trim()) return null;
  str = str.trim().replace(/[^0-9:]/g,'');
  if (!str) return null;
  const parts = str.split(':').map(Number);
  if (parts.some(isNaN)) return null;
  let secs = 0;
  if (parts.length === 2) secs = parts[0] * 60 + parts[1];
  else if (parts.length === 3) secs = parts[0] * 3600 + parts[1] * 60 + parts[2];
  else return null;
  return secs > 0 ? secs : null;
}

function fmt(secs) {
  if (secs == null || isNaN(secs) || secs < 0) return '—';
  const h = Math.floor(secs / 3600);
  const m = Math.floor((secs % 3600) / 60);
  const s = Math.floor(secs % 60);
  if (h > 0) return `${h}:${pad(m)}:${pad(s)}`;
  return `${m}:${pad(s)}`;
}
function pad(n) { return String(n).padStart(2,'0'); }

// ── Derived data ─────────────────────────────────────────────────────────
function getRunSecs(stationIdx) {
  // Run before station[stationIdx]
  const prevOut = stationIdx === 0 ? 0 : data[`s${stationIdx}`]?.out;
  const thisIn  = data[`s${stationIdx + 1}`]?.in;
  if (prevOut == null || thisIn == null) return null;
  const d = thisIn - prevOut;
  return d >= 0 ? d : null;
}

function getStationSecs(id) {
  const d = data[id];
  if (!d?.in || !d?.out) return null;
  const diff = d.out - d.in;
  return diff >= 0 ? diff : null;
}

function calcStats() {
  let runTotal = 0, runCount = 0;
  let stationTotal = 0, stationCount = 0;
  for (let i = 0; i < 8; i++) {
    const r = getRunSecs(i);
    if (r != null) { runTotal += r; runCount++; }
    const s = getStationSecs(`s${i+1}`);
    if (s != null) { stationTotal += s; stationCount++; }
  }
  return { runTotal, runCount, stationTotal, stationCount };
}

// ── Render ────────────────────────────────────────────────────────────────
function render() {
  const timeline = document.getElementById('timeline');
  timeline.innerHTML = '';

  const { runTotal, runCount, stationTotal, stationCount } = calcStats();
  const avgRun     = runCount     > 0 ? runTotal     / runCount     : 6 * 60;
  const avgStation = stationCount > 0 ? stationTotal / stationCount : 5 * 60;

  // Last known race clock = last exit or last entry
  let lastKnownTime = 0;
  for (let i = 8; i >= 1; i--) {
    const d = data[`s${i}`];
    if (d?.out) { lastKnownTime = d.out; break; }
    if (d?.in)  { lastKnownTime = d.in;  break; }
  }

  // Stations fully done
  const stationsDone = Array.from({length:8}, (_,i) => getStationSecs(`s${i+1}`) != null).filter(Boolean).length;

  // ── Build timeline rows ─────────────────────────────────────────
  for (let i = 0; i < 8; i++) {
    const sid  = `s${i+1}`;
    const seg  = STATIONS[i];
    const d    = data[sid] || {};
    const runSecs  = getRunSecs(i);
    const stSecs   = getStationSecs(sid);
    const hasBoth  = d.in != null && d.out != null;
    const hasIn    = d.in != null;

    // ── Run row ──────────────────────────────────────────────────
    const runDoneClass = runSecs != null ? 'done' : '';
    const runLabel = i === 0 ? 'Run 1 (from start)' : `Run ${i+1}`;
    const runPace  = runSecs != null ? `${fmt(runSecs)} · ${fmt(runSecs)}/km` : '—';

    const runRow = document.createElement('div');
    runRow.className = 'run-row';
    runRow.innerHTML = `
      <div class="run-icon">🏃‍♀️</div>
      <div class="run-label">
        <div class="run-name">${runLabel}</div>
        <div class="run-split">${runSecs != null ? fmt(runSecs) + '/km pace' : 'waiting for station entry…'}</div>
      </div>
      <div class="run-time ${runDoneClass}">${runSecs != null ? fmt(runSecs) : '—'}</div>
    `;
    timeline.appendChild(runRow);

    // ── Station card ─────────────────────────────────────────────
    const durClass  = hasBoth ? 'done' : hasIn ? 'partial' : 'empty';
    const durText   = hasBoth ? fmt(stSecs) : hasIn ? 'in progress…' : '—';

    const card = document.createElement('div');
    card.className = 'station-card';
    card.innerHTML = `
      <div class="station-header" onclick="togglePanel('${sid}')">
        <div class="station-badge">${seg.emoji}</div>
        <div class="station-info">
          <div class="station-name">Station ${i+1} · ${seg.name}</div>
          <div class="station-detail">${seg.detail}</div>
        </div>
        <div class="station-duration ${durClass}">${durText}</div>
        <span class="chev" id="chev-${sid}">▼</span>
      </div>
      <div class="station-panel" id="panel-${sid}">
        <div class="ts-row">
          <div class="ts-group">
            <label>💜 Entered station</label>
            <input type="text" class="ts-input in-field" id="in-${sid}"
              placeholder="mm:ss" value="${d.in != null ? fmt(d.in) : ''}"
              autocomplete="off" autocorrect="off" spellcheck="false"
              onkeydown="if(event.key==='Enter') document.getElementById('out-${sid}').focus()"
            />
          </div>
          <div class="ts-group">
            <label>🧡 Exited station</label>
            <input type="text" class="ts-input" id="out-${sid}"
              placeholder="mm:ss" value="${d.out != null ? fmt(d.out) : ''}"
              autocomplete="off" autocorrect="off" spellcheck="false"
              onkeydown="if(event.key==='Enter') save_station('${sid}')"
            />
          </div>
        </div>
        <div class="input-hint">Race clock time (cumulative from start). e.g. 14:32 when they walked in, 19:10 when they walked out.</div>
        <div class="btn-row">
          <button class="btn-set" onclick="save_station('${sid}')">✓ Save</button>
          ${hasIn || hasBoth ? `<button class="btn-clear" onclick="clear_station('${sid}')">Clear</button>` : ''}
        </div>
      </div>
    `;
    timeline.appendChild(card);
  }

  // ── Summary bar ─────────────────────────────────────────────────
  document.getElementById('sum-elapsed').textContent = lastKnownTime > 0 ? fmt(lastKnownTime) : '—';
  document.getElementById('sum-done').textContent = `${stationsDone} / 8`;

  // Progress: weight runs as ~1/3, stations as ~2/3 roughly
  // Simpler: count "checkpoints" = 8 runs + 8 station-exits = 16
  let checkpointsDone = 0;
  for (let i = 0; i < 8; i++) {
    if (getRunSecs(i) != null) checkpointsDone++;
    if (getStationSecs(`s${i+1}`) != null) checkpointsDone++;
  }
  const pct = Math.round(checkpointsDone / 16 * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-pct').textContent = pct + '%';

  // ── Projection ──────────────────────────────────────────────────
  const proj = document.getElementById('projection');
  if (checkpointsDone > 0) {
    proj.style.display = 'block';

    // Projected finish = last known exit time + remaining legs estimated
    // Work from s8.out if done, otherwise extrapolate
    let projected = 0;
    for (let i = 0; i < 8; i++) {
      const sid = `s${i+1}`;
      // Run before this station
      const r = getRunSecs(i);
      projected += r != null ? r : avgRun;
      // Station
      const s = getStationSecs(sid);
      projected += s != null ? s : avgStation;
    }

    document.getElementById('proj-finish').textContent = fmt(projected);
    document.getElementById('sum-finish').textContent  = fmt(projected);

    const projRun     = runTotal     + (8 - runCount)     * avgRun;
    const projStation = stationTotal + (8 - stationCount) * avgStation;
    document.getElementById('proj-run').textContent     = fmt(projRun);
    document.getElementById('proj-station').textContent = fmt(projStation);
    document.getElementById('proj-pace').textContent    = fmt(avgRun) + '/km';

    const remaining = 16 - checkpointsDone;
    if (stationsDone === 8 && getRunSecs(7) != null) {
      document.getElementById('proj-note').textContent = '🎉 Race complete!';
    } else {
      document.getElementById('proj-note').textContent =
        `From ${checkpointsDone} data point${checkpointsDone !== 1 ? 's' : ''} · ${remaining} to go`;
    }
  } else {
    proj.style.display = 'none';
    document.getElementById('sum-finish').textContent = '—';
  }
}

// ── Actions ───────────────────────────────────────────────────────────────
function togglePanel(sid) {
  const panel = document.getElementById(`panel-${sid}`);
  const chev  = document.getElementById(`chev-${sid}`);
  const isOpen = panel.classList.contains('open');
  document.querySelectorAll('.station-panel').forEach(p => p.classList.remove('open'));
  document.querySelectorAll('.chev').forEach(c => c.classList.remove('open'));
  if (!isOpen) {
    panel.classList.add('open');
    chev.classList.add('open');
    // Focus first empty field
    setTimeout(() => {
      const inEl  = document.getElementById(`in-${sid}`);
      const outEl = document.getElementById(`out-${sid}`);
      if (!inEl.value) inEl.focus();
      else if (!outEl.value) outEl.focus();
      else inEl.focus();
    }, 60);
  }
}

function save_station(sid) {
  const inEl  = document.getElementById(`in-${sid}`);
  const outEl = document.getElementById(`out-${sid}`);
  const inT   = parseTime(inEl.value);
  const outT  = parseTime(outEl.value);

  let valid = true;
  // At least one must be set
  if (!inT && !outT) {
    [inEl, outEl].forEach(el => { el.classList.add('error'); setTimeout(() => el.classList.remove('error'), 800); });
    return;
  }
  // If both set, out must be after in
  if (inT && outT && outT <= inT) {
    outEl.classList.add('error');
    setTimeout(() => outEl.classList.remove('error'), 800);
    return;
  }

  data[sid] = {};
  if (inT)  data[sid].in  = inT;
  if (outT) data[sid].out = outT;

  save();
  render();

  // Auto-open next station's panel if out was just set
  if (outT) {
    const idx = STATIONS.findIndex(s => s.id === sid);
    if (idx < 7) {
      setTimeout(() => togglePanel(`s${idx + 2}`), 150);
    }
  }
}

function clear_station(sid) {
  delete data[sid];
  save();
  render();
}

function resetAll() {
  if (!confirm('Reset everything?')) return;
  data = {};
  save();
  render();
}

// ── Init ─────────────────────────────────────────────────────────────────
load();
render();
</script>
</body>
</html>
