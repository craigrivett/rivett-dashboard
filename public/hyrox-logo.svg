<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5a623;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8870a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bggrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a22;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f0f18;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="96" fill="url(#bggrad)" stroke="#2a2a38" stroke-width="2"/>

  <!-- Left runner figure (stylized) -->
  <!-- Head -->
  <circle cx="68" cy="54" r="10" fill="url(#grad)"/>
  <!-- Body leaning forward -->
  <line x1="68" y1="64" x2="72" y2="100" stroke="url(#grad)" stroke-width="7" stroke-linecap="round"/>
  <!-- Left arm back -->
  <line x1="70" y1="78" x2="50" y2="88" stroke="url(#grad)" stroke-width="5" stroke-linecap="round"/>
  <!-- Right arm forward -->
  <line x1="70" y1="78" x2="90" y2="70" stroke="url(#grad)" stroke-width="5" stroke-linecap="round"/>
  <!-- Left leg back -->
  <line x1="72" y1="100" x2="55" y2="130" stroke="url(#grad)" stroke-width="6" stroke-linecap="round"/>
  <!-- Right leg forward/bent -->
  <line x1="72" y1="100" x2="85" y2="118" stroke="url(#grad)" stroke-width="6" stroke-linecap="round"/>
  <line x1="85" y1="118" x2="95" y2="108" stroke="url(#grad)" stroke-width="5" stroke-linecap="round"/>

  <!-- Right runner figure (mirror) -->
  <!-- Head -->
  <circle cx="132" cy="54" r="10" fill="url(#grad)"/>
  <!-- Body -->
  <line x1="132" y1="64" x2="128" y2="100" stroke="url(#grad)" stroke-width="7" stroke-linecap="round"/>
  <!-- Right arm back -->
  <line x1="130" y1="78" x2="150" y2="88" stroke="url(#grad)" stroke-width="5" stroke-linecap="round"/>
  <!-- Left arm forward -->
  <line x1="130" y1="78" x2="110" y2="70" stroke="url(#grad)" stroke-width="5" stroke-linecap="round"/>
  <!-- Right leg back -->
  <line x1="128" y1="100" x2="145" y2="130" stroke="url(#grad)" stroke-width="6" stroke-linecap="round"/>
  <!-- Left leg forward/bent -->
  <line x1="128" y1="100" x2="115" y2="118" stroke="url(#grad)" stroke-width="6" stroke-linecap="round"/>
  <line x1="115" y1="118" x2="105" y2="108" stroke="url(#grad)" stroke-width="5" stroke-linecap="round"/>

  <!-- Crossbar connecting the two figures (the H bar) -->
  <rect x="76" y="90" width="48" height="8" rx="4" fill="url(#grad)"/>

  <!-- HYROX text -->
  <text x="100" y="168" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Arial Black', sans-serif"
        font-weight="900" font-size="22" fill="#f5a623" letter-spacing="6">HYROX</text>

  <!-- Subtitle -->
  <text x="100" y="184" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, Arial, sans-serif"
        font-weight="400" font-size="10" fill="#9090aa" letter-spacing="2">SPLIT TRACKER</text>
</svg>
